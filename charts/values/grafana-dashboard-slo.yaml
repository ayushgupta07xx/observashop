apiVersion: v1
kind: ConfigMap
metadata:
  name: users-service-slo-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  users-service-slo.json: |-
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "orange", "value": 0.995 }, { "color": "green", "value": 0.999 }] },
              "unit": "percentunit",
              "min": 0.99,
              "max": 1
            }
          },
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 0 },
          "id": 1,
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [{ "expr": "1 - sli:users_service:error_ratio:rate1h", "refId": "A" }],
          "title": "Availability (1h) - target 99.9%",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "orange", "value": 0.995 }, { "color": "green", "value": 0.999 }] },
              "unit": "percentunit",
              "min": 0.99,
              "max": 1
            }
          },
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 0 },
          "id": 2,
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [{ "expr": "1 - sli:users_service:latency_bad_ratio:rate1h", "refId": "A" }],
          "title": "Latency SLO (1h) - target 99.9% < 250ms",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 1 }, { "color": "red", "value": 14 }] },
              "unit": "short"
            }
          },
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 0 },
          "id": 3,
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [{ "expr": "clamp_min(sli:users_service:error_ratio:rate1h / 0.001, 0)", "refId": "A" }],
          "title": "Error budget burn rate (1h)",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "custom": { "drawStyle": "line", "fillOpacity": 20, "lineWidth": 2, "showPoints": "never" }, "unit": "percentunit" } },
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 6 },
          "id": 4,
          "options": { "legend": { "displayMode": "table", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "expr": "sli:users_service:error_ratio:rate5m", "legendFormat": "5m error ratio", "refId": "A" },
            { "expr": "sli:users_service:error_ratio:rate1h", "legendFormat": "1h error ratio", "refId": "B" },
            { "expr": "0.001", "legendFormat": "SLO threshold (0.1%)", "refId": "C" }
          ],
          "title": "Error ratio vs SLO threshold",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "custom": { "drawStyle": "line", "fillOpacity": 20, "lineWidth": 2, "showPoints": "never" }, "unit": "percentunit" } },
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 6 },
          "id": 5,
          "options": { "legend": { "displayMode": "table", "placement": "bottom" } },
          "targets": [
            { "expr": "sli:users_service:latency_bad_ratio:rate5m", "legendFormat": "5m >250ms fraction", "refId": "A" },
            { "expr": "sli:users_service:latency_bad_ratio:rate1h", "legendFormat": "1h >250ms fraction", "refId": "B" },
            { "expr": "0.001", "legendFormat": "SLO threshold (0.1%)", "refId": "C" }
          ],
          "title": "Latency SLI: fraction of requests > 250ms",
          "type": "timeseries"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 38,
      "tags": ["observashop", "slo"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "",
      "title": "ObservaShop - Users Service SLO",
      "uid": "observashop-users-slo",
      "version": 1
    }
