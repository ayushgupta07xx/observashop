# loki-stack bundles Loki + Promtail + optional Grafana
# We already have Grafana from kube-prometheus-stack, so disable the bundled one

loki:
  enabled: true
  isDefault: false
  persistence:
    enabled: true
    size: 2Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 512Mi

promtail:
  enabled: true
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

grafana:
  enabled: false

prometheus:
  enabled: false

fluent-bit:
  enabled: false
