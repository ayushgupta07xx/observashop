apiVersion: v1
kind: ConfigMap
metadata:
  name: users-service-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  users-service.json: |-
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never" },
              "unit": "reqps"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            {
              "expr": "sum by (route) (rate(http_requests_total{service=\"users-service\"}[1m]))",
              "legendFormat": "{{route}}",
              "refId": "A"
            }
          ],
          "title": "Request rate (req/s) by route",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never" },
              "unit": "percentunit",
              "min": 0,
              "max": 1
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{service=\"users-service\",status_code=~\"5..\"}[5m])) / sum(rate(http_requests_total{service=\"users-service\"}[5m]))",
              "legendFormat": "error rate",
              "refId": "A"
            }
          ],
          "title": "Error rate (5xx / total)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never" },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "id": 3,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (le, route) (rate(http_request_duration_seconds_bucket{service=\"users-service\"}[5m])))",
              "legendFormat": "p50 {{route}}",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le, route) (rate(http_request_duration_seconds_bucket{service=\"users-service\"}[5m])))",
              "legendFormat": "p95 {{route}}",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le, route) (rate(http_request_duration_seconds_bucket{service=\"users-service\"}[5m])))",
              "legendFormat": "p99 {{route}}",
              "refId": "C"
            }
          ],
          "title": "HTTP latency percentiles by route",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never" },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "id": 4,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, operation) (rate(db_query_duration_seconds_bucket{service=\"users-service\"}[5m])))",
              "legendFormat": "p95 {{operation}}",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le, operation) (rate(db_query_duration_seconds_bucket{service=\"users-service\"}[5m])))",
              "legendFormat": "p99 {{operation}}",
              "refId": "B"
            }
          ],
          "title": "DB query latency by operation",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] },
              "unit": "short"
            }
          },
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 16 },
          "id": 5,
          "options": { "colorMode": "background", "graphMode": "area", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "expr": "sum(up{namespace=\"observashop\", pod=~\"users-service.*\"})",
              "refId": "A"
            }
          ],
          "title": "Healthy pods",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "reqps"
            }
          },
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 16 },
          "id": 6,
          "options": { "colorMode": "value", "graphMode": "area", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{service=\"users-service\"}[1m]))",
              "refId": "A"
            }
          ],
          "title": "Total req/s",
          "type": "stat"
        },
        {
          "datasource": { "type": "loki", "uid": "P8E80F9AEF21F6940" },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 22 },
          "id": 7,
          "options": { "dedupStrategy": "none", "showLabels": false, "showTime": true, "sortOrder": "Descending", "wrapLogMessage": true },
          "targets": [
            {
              "expr": "{namespace=\"observashop\", pod=~\"users-service.*\"}",
              "refId": "A"
            }
          ],
          "title": "users-service logs",
          "type": "logs"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 38,
      "tags": ["observashop", "users-service"],
      "templating": { "list": [] },
      "time": { "from": "now-15m", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "ObservaShop - Users Service",
      "uid": "observashop-users",
      "version": 1
    }
